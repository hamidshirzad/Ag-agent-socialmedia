<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fourdoor AI | Autonomous Social Media & Lead Gen SaaS</title>
    <meta name="description" content="Fourdoor AI is an autonomous, AI-driven marketing and lead generation SaaS platform. It generates social media content, engages users, qualifies leads, and books sales calls autonomously." />

    <!-- Canonical -->
    <link rel="canonical" href="https://fourdoor.ai/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://fourdoor.ai/" />
    <meta property="og:title"       content="Fourdoor AI | Autonomous Social Media &amp; Lead Gen SaaS" />
    <meta property="og:description" content="Fourdoor AI is an autonomous, AI-driven marketing and lead generation SaaS platform. It generates social media content, engages users, qualifies leads, and books sales calls autonomously." />
    <!--
      Share image: place /public/og-image.png at 1200×630 px, then add these tags:
        Serve via Netlify Image CDN for exact dimensions:
        <meta property="og:image"        content="https://fourdoor.ai/.netlify/images?url=/og-image.png&w=1200&h=630&fit=cover&fm=png" />
        <meta property="og:image:width"  content="1200" />
        <meta property="og:image:height" content="630" />
        <meta name="twitter:image"       content="https://fourdoor.ai/.netlify/images?url=/og-image.png&w=1200&h=630&fit=cover&fm=png" />
        Also update PageMeta.tsx: change twitter:card from "summary" to "summary_large_image".
    -->

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:url"         content="https://fourdoor.ai/" />
    <meta name="twitter:title"       content="Fourdoor AI | Autonomous Social Media &amp; Lead Gen SaaS" />
    <meta name="twitter:description" content="Fourdoor AI is an autonomous, AI-driven marketing and lead generation SaaS platform. It generates social media content, engages users, qualifies leads, and books sales calls autonomously." />

    <!-- Brand Identity & Styling -->
    <meta name="theme-color" content="#1E3932" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Performance: Preconnect to fonts for fast loading (LCP optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" /></noscript>
    <!-- DNS prefetch for Firebase / Gemini API origins -->
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <!-- Stripe Buy Button (used by src/pages/Billing.tsx) -->
    <script async src="https://js.stripe.com/v3/buy-button.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
