<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Fourdoor AI — Autonomous Marketing &amp; Lead Generation</title>
    <meta name="description" content="Autonomous AI-driven marketing and lead generation. Generate content, engage leads, and book sales calls on autopilot." />

    <!-- Canonical -->
    <!-- TODO: Replace with your deployed domain once known, e.g. https://fourdoor.ai -->
    <link rel="canonical" href="https://fourdoor.ai" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Fourdoor AI" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fourdoor.ai" />
    <meta property="og:title" content="Fourdoor AI — Autonomous Marketing &amp; Lead Generation" />
    <meta property="og:description" content="Autonomous AI-driven marketing and lead generation. Generate content, engage leads, and book sales calls on autopilot." />
    <!--
      OG Image (add when ready):
        Place a 1200×630 PNG at /public/og-image.png, then add:
          <meta property="og:image" content="https://fourdoor.ai/og-image.png" />
          <meta property="og:image:width" content="1200" />
          <meta property="og:image:height" content="630" />
        With Netlify Image CDN you can serve it at exact dimensions:
          <meta property="og:image" content="https://fourdoor.ai/.netlify/images?url=/og-image.png&w=1200&h=630&fit=cover&fm=png" />
    -->

    <!-- Twitter Card -->
    <!--
      Change twitter:card to "summary_large_image" once og:image is added above.
    -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Fourdoor AI — Autonomous Marketing &amp; Lead Generation" />
    <meta name="twitter:description" content="Autonomous AI-driven marketing and lead generation. Generate content, engage leads, and book sales calls on autopilot." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
