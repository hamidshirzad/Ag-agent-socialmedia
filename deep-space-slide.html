<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deep Space</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --deep:    #00000f;
    --nebula1: #0d0628;
    --nebula2: #07152e;
    --blue:    #1a6fff;
    --cyan:    #00e5ff;
    --violet:  #7b2fff;
    --gold:    #ffcc44;
    --white:   #e8f4ff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Rajdhani', sans-serif;
    color: var(--white);
  }

  /* ─── CANVAS ─── */
  #space-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ─── NEBULA LAYERS ─── */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 1;
    animation: nebula-drift 18s ease-in-out infinite alternate;
  }
  .neb-a {
    width: 700px; height: 500px;
    top: -100px; left: -150px;
    background: radial-gradient(ellipse, rgba(123,47,255,0.35) 0%, transparent 70%);
    animation-duration: 22s;
  }
  .neb-b {
    width: 600px; height: 400px;
    bottom: -120px; right: -100px;
    background: radial-gradient(ellipse, rgba(26,111,255,0.3) 0%, transparent 70%);
    animation-duration: 17s;
    animation-direction: alternate-reverse;
  }
  .neb-c {
    width: 400px; height: 300px;
    top: 40%; left: 55%;
    background: radial-gradient(ellipse, rgba(0,229,255,0.18) 0%, transparent 70%);
    animation-duration: 25s;
  }
  .neb-d {
    width: 500px; height: 350px;
    top: 10%; right: 20%;
    background: radial-gradient(ellipse, rgba(255,80,80,0.12) 0%, transparent 70%);
    animation-duration: 20s;
    animation-direction: alternate-reverse;
  }
  @keyframes nebula-drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.08); }
  }

  /* ─── GRID OVERLAY ─── */
  .grid {
    position: fixed;
    inset: 0;
    z-index: 2;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    perspective: 600px;
    animation: grid-breathe 8s ease-in-out infinite;
  }
  @keyframes grid-breathe {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }

  /* ─── SCAN LINE ─── */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(0,229,255,0.6), transparent);
    z-index: 3;
    animation: scan 6s linear infinite;
    box-shadow: 0 0 20px rgba(0,229,255,0.4);
  }
  @keyframes scan {
    from { top: -10px; }
    to   { top: 100%; }
  }

  /* ─── CONTENT ─── */
  .stage {
    position: relative;
    z-index: 10;
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* eye-catcher orb */
  .orb {
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
      rgba(255,255,255,0.9) 0%,
      rgba(0,229,255,0.8) 25%,
      rgba(26,111,255,0.6) 55%,
      rgba(123,47,255,0.4) 80%,
      transparent 100%);
    box-shadow:
      0 0 60px rgba(0,229,255,0.5),
      0 0 120px rgba(26,111,255,0.3),
      0 0 200px rgba(123,47,255,0.2);
    animation: orb-pulse 4s ease-in-out infinite, orb-in 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0;
    position: relative;
    margin-bottom: 48px;
  }
  .orb::after {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.25);
    animation: ring-rotate 8s linear infinite;
  }
  .orb::before {
    content: '';
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    border: 1px dashed rgba(123,47,255,0.2);
    animation: ring-rotate 14s linear infinite reverse;
  }
  @keyframes orb-pulse {
    0%, 100% { box-shadow: 0 0 60px rgba(0,229,255,0.5), 0 0 120px rgba(26,111,255,0.3), 0 0 200px rgba(123,47,255,0.2); }
    50%       { box-shadow: 0 0 90px rgba(0,229,255,0.8), 0 0 180px rgba(26,111,255,0.5), 0 0 280px rgba(123,47,255,0.35); }
  }
  @keyframes orb-in {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes ring-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .eyebrow {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.4em;
    color: var(--cyan);
    text-transform: uppercase;
    opacity: 0;
    animation: fade-up 1s 0.6s forwards;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-align: center;
    background: linear-gradient(135deg, #ffffff 0%, #a8d8ff 40%, var(--cyan) 70%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fade-up 1s 0.9s forwards;
    text-shadow: none;
    position: relative;
  }
  h1 .glow-word {
    display: inline-block;
    filter: drop-shadow(0 0 20px rgba(0,229,255,0.6));
  }

  .subtitle {
    margin-top: 28px;
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    color: rgba(232,244,255,0.6);
    text-align: center;
    max-width: 520px;
    line-height: 1.7;
    opacity: 0;
    animation: fade-up 1s 1.2s forwards;
  }

  .divider {
    margin-top: 40px;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0;
    animation: fade-in 1s 1.5s forwards;
  }

  .stats {
    margin-top: 36px;
    display: flex;
    gap: 56px;
    opacity: 0;
    animation: fade-up 1s 1.7s forwards;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--cyan);
    display: block;
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
    counter-reset: num;
  }
  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(232,244,255,0.4);
    margin-top: 4px;
    display: block;
  }

  .cta {
    margin-top: 52px;
    display: flex; gap: 16px;
    opacity: 0;
    animation: fade-up 1s 2s forwards;
  }
  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 14px 32px;
    border-radius: 3px;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    color: #00000f;
    box-shadow: 0 0 30px rgba(0,229,255,0.3);
  }
  .btn-primary:hover {
    box-shadow: 0 0 60px rgba(0,229,255,0.6);
    transform: translateY(-2px);
  }
  .btn-ghost {
    background: transparent;
    color: var(--cyan);
    border: 1px solid rgba(0,229,255,0.4);
  }
  .btn-ghost:hover {
    background: rgba(0,229,255,0.08);
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,229,255,0.2);
    transform: translateY(-2px);
  }

  /* corner decorations */
  .corner {
    position: fixed;
    width: 60px; height: 60px;
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s 2.2s forwards;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1px solid rgba(0,229,255,0.5); border-left: 1px solid rgba(0,229,255,0.5); }
  .corner-tr { top: 24px; right: 24px; border-top: 1px solid rgba(0,229,255,0.5); border-right: 1px solid rgba(0,229,255,0.5); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(0,229,255,0.5); border-left: 1px solid rgba(0,229,255,0.5); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(0,229,255,0.5); border-right: 1px solid rgba(0,229,255,0.5); }

  /* coordinate display */
  .coords {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: rgba(0,229,255,0.3);
    z-index: 10;
    opacity: 0;
    animation: fade-in 1s 2.4s forwards;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<div class="nebula neb-a"></div>
<div class="nebula neb-b"></div>
<div class="nebula neb-c"></div>
<div class="nebula neb-d"></div>

<div class="grid"></div>
<div class="scanline"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="stage">
  <div class="orb"></div>
  <div class="eyebrow">Sector 7 — Deep Field Observation</div>
  <h1>INTO THE<br><span class="glow-word">INFINITE</span></h1>
  <p class="subtitle">
    Traveling at the speed of light through 93 billion light-years<br>
    of observable universe — and still counting.
  </p>
  <div class="divider"></div>
  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="n1">0</span>
      <span class="stat-label">Light Years</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="n2">0</span>
      <span class="stat-label">Galaxies Mapped</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="n3">0</span>
      <span class="stat-label">Stars Catalogued</span>
    </div>
  </div>
  <div class="cta">
    <a href="#" class="btn btn-primary">Launch Mission</a>
    <a href="#" class="btn btn-ghost">Explore Data</a>
  </div>
</div>

<div class="coords" id="coords">RA 00h 00m 00s · DEC +00° 00' 00"</div>

<script>
/* ─── WARP STAR FIELD ─── */
const canvas = document.getElementById('space-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const CX = () => canvas.width / 2;
const CY = () => canvas.height / 2;
const NUM_STARS = 420;

const stars = Array.from({ length: NUM_STARS }, () => ({
  x: (Math.random() - 0.5) * canvas.width  * 4,
  y: (Math.random() - 0.5) * canvas.height * 4,
  z: Math.random() * canvas.width,
  pz: 0,
  hue: Math.random() < 0.15 ? 190 + Math.random() * 60 : 200 + Math.random() * 40,
  size: Math.random() * 1.5 + 0.3,
}));

// Slow drift parallax for mouse
let mx = 0, my = 0;
window.addEventListener('mousemove', e => {
  mx = (e.clientX / window.innerWidth  - 0.5) * 0.6;
  my = (e.clientY / window.innerHeight - 0.5) * 0.6;
});

let speed = 1;
let tick = 0;

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Radial depth gradient
  const grad = ctx.createRadialGradient(CX(), CY(), 0, CX(), CY(), canvas.width * 0.7);
  grad.addColorStop(0,   'rgba(13,6,40,0.0)');
  grad.addColorStop(0.5, 'rgba(7,21,46,0.3)');
  grad.addColorStop(1,   'rgba(0,0,15,0.7)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = CX() + mx * 30;
  const cy = CY() + my * 30;

  for (const s of stars) {
    s.pz = s.z;
    s.z -= speed;

    if (s.z <= 0) {
      s.x  = (Math.random() - 0.5) * canvas.width  * 4;
      s.y  = (Math.random() - 0.5) * canvas.height * 4;
      s.z  = canvas.width;
      s.pz = s.z;
    }

    const sx  = (s.x / s.z)  * canvas.width  + cx;
    const sy  = (s.y / s.z)  * canvas.height + cy;
    const psx = (s.x / s.pz) * canvas.width  + cx;
    const psy = (s.y / s.pz) * canvas.height + cy;

    const depth = 1 - s.z / canvas.width;
    const r = s.size * depth * 2.5;
    const alpha = Math.min(1, depth * 1.4);

    ctx.beginPath();
    ctx.moveTo(psx, psy);
    ctx.lineTo(sx, sy);
    ctx.strokeStyle = `hsla(${s.hue},90%,85%,${alpha})`;
    ctx.lineWidth = r;
    ctx.stroke();

    // glow for close stars
    if (depth > 0.7) {
      ctx.beginPath();
      ctx.arc(sx, sy, r * 2, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue},100%,90%,${(depth - 0.7) * 0.5})`;
      ctx.fill();
    }
  }

  // Subtle central lens flare
  const lf = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
  lf.addColorStop(0,   'rgba(0,229,255,0.04)');
  lf.addColorStop(0.4, 'rgba(26,111,255,0.02)');
  lf.addColorStop(1,   'transparent');
  ctx.fillStyle = lf;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  tick++;
  // Gradually accelerate then ease
  speed = 1.5 + Math.sin(tick * 0.008) * 1.2;

  requestAnimationFrame(drawStars);
}
drawStars();

/* ─── COUNTER ANIMATION ─── */
function animateCounter(el, target, suffix, duration) {
  const start = performance.now();
  const update = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.floor(ease * target).toLocaleString() + suffix;
    if (p < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

setTimeout(() => {
  animateCounter(document.getElementById('n1'), 93,   'B', 2000);
  animateCounter(document.getElementById('n2'), 2000, '+', 2200);
  animateCounter(document.getElementById('n3'), 400,  'T', 2400);
}, 1800);

/* ─── LIVE COORDINATES ─── */
const coordEl = document.getElementById('coords');
function updateCoords() {
  const t = Date.now() / 1000;
  const ra_h  = String(Math.floor((t / 3600) % 24)).padStart(2,'0');
  const ra_m  = String(Math.floor((t / 60)   % 60)).padStart(2,'0');
  const ra_s  = String(Math.floor(t           % 60)).padStart(2,'0');
  const dec_d = String(Math.floor(Math.abs(Math.sin(t * 0.01) * 90))).padStart(2,'0');
  const dec_m = String(Math.floor(Math.random() * 60)).padStart(2,'0');
  const dec_s = String(Math.floor(Math.random() * 60)).padStart(2,'0');
  coordEl.textContent = `RA ${ra_h}h ${ra_m}m ${ra_s}s  ·  DEC +${dec_d}° ${dec_m}' ${dec_s}"`;
}
setInterval(updateCoords, 800);
</script>
</body>
</html>
