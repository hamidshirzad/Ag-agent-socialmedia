# DatadogAgent Custom Resource (v2alpha1).
# Reconciled by the Datadog Operator into a DaemonSet + Cluster Agent.
#
# Usage:
#   kubectl -n datadog apply -f datadog-agent.yaml
#
# Prerequisites:
#   1. Datadog Operator running (installed via datadog-values.yaml).
#   2. API key Secret exists:
#        kubectl -n datadog create secret generic datadog-secret \
#          --from-literal api-key='<YOUR_DD_API_KEY>'
#   3. Application pods that should receive APM auto-instrumentation must
#      carry this label (because mutateUnlabelled: false in the operator):
#        admission.datadoghq.com/enabled: "true"

apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:

  # ── Global ──────────────────────────────────────────────────────────────────
  global:
    # API key sourced from Kubernetes Secret — never hardcoded.
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key

    # EU region — matches DD_SITE and datadoghq.eu in src/lib/datadog.ts.
    site: datadoghq.eu

    # Unified Service Tagging: propagated to all traces, metrics, and logs.
    tags:
      - "env:staging"
      - "service:fourdoorai"

    # Remove this block on managed clusters (EKS/GKE/AKS) with proper kubelet PKI.
    kubelet:
      tlsVerify: false

  # ── Features ────────────────────────────────────────────────────────────────
  features:

    # ── APM ───────────────────────────────────────────────────────────────────
    apm:
      enabled: true

      # Unix Domain Socket transport — matches DD_TRACE_AGENT_URL in the app:
      #   unix:///var/run/datadog/apm.socket
      # The admission controller automatically mounts this socket into labelled
      # application pods and sets DD_TRACE_AGENT_URL, so src/lib/datadog.ts
      # picks up the agent URL without any manual env var change.
      unixDomainSocketConfig:
        enabled: true
        path: /var/run/datadog/apm.socket

      # Auto-instrumentation via admission controller.
      # Injects dd-trace init containers and DD_* env vars at pod creation time.
      instrumentation:
        enabled: true
        # Add your application namespace(s) here.
        # Remove enabledNamespaces entirely to instrument all namespaces.
        enabledNamespaces:
          - default
        targets:
          - name: "default-target"
            ddTraceVersions:
              js: "5"       # matches dd-trace@^5.103.0 in package.json
              java: "1"
              python: "4"
              php: "1"
              dotnet: "3"
              ruby: "2"

    # ── LLM Observability ─────────────────────────────────────────────────────
    # Enables the LLMObs pipeline instrumented in src/services/aiService.ts.
    # mlApp matches DD_LLMOBS_ML_APP=fourdoorai and tracer.init() in datadog.ts.
    # Socket transport means agentlessEnabled is false — auth flows via the Agent.
    llmObservability:
      enabled: true
      mlApp: fourdoorai

    # ── Log collection ────────────────────────────────────────────────────────
    logCollection:
      enabled: true
      containerCollectAll: true

  # ── Overrides ────────────────────────────────────────────────────────────────
  override:
    nodeAgent:
      env:
        - name: DD_SERVICE
          value: fourdoorai
        - name: DD_ENV
          value: staging
        - name: DD_LLMOBS_ML_APP
          value: fourdoorai
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Cluster Agent is required when instrumentation.enabled = true
    # (it registers the mutating admission webhook).
    clusterAgent:
      replicas: 1
      env:
        - name: DD_SERVICE
          value: fourdoorai
        - name: DD_ENV
          value: staging
