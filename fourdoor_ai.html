<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fourdoor AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="twcfg">
tailwind.config = {
  darkMode:"class",
  theme:{ extend:{
    colors:{
      "surface":"#0b1326","surface-bright":"#31394d","background":"#0b1326",
      "surface-dim":"#0b1326","secondary":"#5de6ff","on-background":"#dae2fd",
      "primary-container":"#8083ff","error":"#ffb4ab","outline-variant":"#464554",
      "surface-variant":"#2d3449","outline":"#908fa0","secondary-container":"#00cbe6",
      "surface-container-highest":"#2d3449","surface-container-low":"#131b2e",
      "surface-container":"#171f33","primary-fixed":"#e1e0ff","on-surface-variant":"#c7c4d7",
      "on-surface":"#dae2fd","on-primary":"#1000a9","primary":"#c0c1ff",
      "surface-container-high":"#222a3d","on-secondary":"#00363e",
      "tertiary-container":"#ff516a","tertiary":"#ffb2b7"
    },
    borderRadius:{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    fontFamily:{"body-main":["Inter"],"data-point":["Space Grotesk"],"bant-score":["Space Grotesk"],"h1":["Inter"],"h2":["Inter"],"label-caps":["Space Grotesk"]},
    fontSize:{
      "body-main":["16px",{lineHeight:"1.6",fontWeight:"400"}],
      "data-point":["24px",{lineHeight:"1",letterSpacing:"0.05em",fontWeight:"600"}],
      "bant-score":["14px",{lineHeight:"1",fontWeight:"700"}],
      "h2":["30px",{lineHeight:"1.3",letterSpacing:"-0.01em",fontWeight:"600"}],
      "h1":["40px",{lineHeight:"1.2",letterSpacing:"-0.02em",fontWeight:"700"}],
      "label-caps":["12px",{lineHeight:"1",letterSpacing:"0.1em",fontWeight:"500"}]
    }
  }}
}
</script>
<style>
*{box-sizing:border-box}
body{background:#020617;color:#dae2fd;font-family:Inter,sans-serif;margin:0;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:rgba(15,23,42,0.65);backdrop-filter:blur(16px);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;z-index:50;overflow-y:auto;transition:transform .3s ease}
#sidebar.collapsed{transform:translateX(-260px)}
.sidebar-logo{display:flex;align-items:center;gap:12px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.05)}
.logo-icon{width:34px;height:34px;border-radius:8px;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);display:flex;align-items:center;justify-content:center}
.logo-title{font-size:15px;font-weight:800;color:#f1f5f9;letter-spacing:-0.02em}
.logo-sub{font-size:9px;letter-spacing:.15em;color:#818cf8;text-transform:uppercase;margin-top:2px}
.nav-section{flex:1;padding:10px 8px}
.nav-group{margin-bottom:2px}
.nav-group-btn{width:100%;display:flex;align-items:center;gap:10px;padding:7px 12px;border:none;background:none;cursor:pointer;color:#64748b;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:4px;transition:all .2s}
.nav-group-btn:hover{color:#94a3b8;background:rgba(255,255,255,.03)}
.nav-group-btn .chevron{margin-left:auto;font-size:16px;transition:transform .2s}
.nav-group-btn.open .chevron{transform:rotate(180deg)}
.nav-group-btn .material-symbols-outlined{font-size:17px}
.nav-group-items{overflow:hidden;max-height:0;transition:max-height .3s ease}
.nav-group-items.open{max-height:500px}
.nav-item{width:100%;display:flex;align-items:center;gap:10px;padding:7px 12px 7px 16px;border:none;background:none;cursor:pointer;color:#64748b;font-size:13px;font-weight:500;text-align:left;border-radius:4px;transition:all .2s;border-left:2px solid transparent;margin:1px 0}
.nav-item:hover{color:#c0c1ff;background:rgba(192,193,255,.05)}
.nav-item.active{color:#c0c1ff;background:rgba(192,193,255,.08);border-left-color:#8083ff}
.nav-item .material-symbols-outlined{font-size:16px}
.sidebar-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.05)}
.footer-btn{width:100%;display:flex;align-items:center;gap:10px;padding:7px 12px;border:none;background:none;cursor:pointer;color:#475569;font-size:13px;font-weight:500;border-radius:4px;transition:all .2s}
.footer-btn:hover{color:#94a3b8;background:rgba(255,255,255,.03)}
.new-campaign-btn{margin:8px;padding:10px 16px;background:linear-gradient(135deg,#6366f1,#8083ff);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(99,102,241,.25);transition:all .2s}
.new-campaign-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(99,102,241,.4)}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:260px;right:0;height:56px;background:rgba(2,6,23,.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:40;transition:left .3s ease}
#topbar.full{left:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.sidebar-toggle{background:none;border:none;cursor:pointer;color:#64748b;padding:5px;border-radius:6px;display:flex;transition:all .2s}
.sidebar-toggle:hover{color:#94a3b8;background:rgba(255,255,255,.05)}
#breadcrumb{font-size:13px;color:#64748b;font-weight:500}
#page-title{font-size:13px;color:#e2e8f0;font-weight:600;margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-btn{background:none;border:none;cursor:pointer;color:#64748b;padding:5px;border-radius:6px;display:flex;transition:all .2s}
.topbar-btn:hover{color:#94a3b8;background:rgba(255,255,255,.05)}
.plan-badge{background:rgba(192,193,255,.1);border:1px solid rgba(192,193,255,.2);color:#c0c1ff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.05em}

/* ── CONTENT ── */
#content-wrap{position:fixed;left:260px;top:56px;right:0;bottom:0;overflow-y:auto;transition:left .3s ease}
#content-wrap.full{left:0}
.page-fade-in{animation:pageFade .22s ease forwards}
@keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.glass-card{background:rgba(15,23,42,.4);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05)}
.glass-panel{background:rgba(15,23,42,.55);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06)}
.activity-line{position:relative}
.activity-line::before{content:"";position:absolute;left:-17px;top:24px;bottom:-24px;width:1px;background:rgba(144,143,160,.2)}
.activity-line:last-child::before{display:none}

/* ── AGENT MINIONS PANEL ── */
#minion-bar{position:fixed;bottom:0;left:260px;right:0;height:96px;background:rgba(6,14,32,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(99,102,241,.15);display:flex;align-items:center;justify-content:center;gap:32px;z-index:45;transition:left .3s ease}
#minion-bar.full{left:0}
#content-wrap{bottom:96px}

.minion-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .2s}
.minion-wrap:hover{transform:translateY(-3px)}
.minion-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#64748b;transition:color .2s}
.minion-wrap:hover .minion-label{color:#c0c1ff}
.minion-status{font-size:9px;color:#475569;letter-spacing:.05em}

/* ── SVG MINION ANIMATIONS ── */
@keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(0.1)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes think-bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-2px) rotate(1deg)}}
@keyframes arm-wave{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-30deg)}75%{transform:rotate(20deg)}}
@keyframes arm-type{0%,100%{transform:rotate(10deg)}50%{transform:rotate(-10deg)}}
@keyframes arm-scan{0%{transform:rotate(-20deg)}100%{transform:rotate(20deg)}}
@keyframes eye-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes screen-flicker{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes gear-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes pulse-glow{0%,100%{filter:drop-shadow(0 0 4px currentColor)}50%{filter:drop-shadow(0 0 12px currentColor)}}
@keyframes walk{0%,100%{transform:translateX(0)}25%{transform:translateX(1px)}75%{transform:translateX(-1px)}}
@keyframes idle-sway{0%,100%{transform:rotate(0deg)}33%{transform:rotate(-2deg)}66%{transform:rotate(2deg)}}

.minion-active .minion-body{animation:bob .8s ease-in-out infinite}
.minion-thinking .minion-body{animation:think-bob 1.2s ease-in-out infinite}
.minion-idle .minion-body{animation:idle-sway 3s ease-in-out infinite}
.minion-active{color:#5de6ff}
.minion-thinking{color:#818cf8}
.minion-idle{color:#475569}

@media(max-width:768px){
  #sidebar{transform:translateX(-260px)}
  #sidebar.mobile-open{transform:translateX(0)}
  #topbar,#content-wrap,#minion-bar{left:0!important}
  .mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;display:none}
  .mobile-overlay.show{display:block}
  #minion-bar{gap:16px;padding:0 8px}
}
</style>
</head>

<!-- ══════════════════════════════════════════════════
     AGENT MINION BAR
═══════════════════════════════════════════════════ -->
<div id="minion-bar">

  <!-- CONTENT AGENT — typing minion, ACTIVE -->
  <div class="minion-wrap minion-active" onclick="navigate('content_agent_hub')" title="Go to Content Hub">
    <svg class="minion-body" width="52" height="64" viewBox="0 0 52 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#5de6ff;filter:drop-shadow(0 0 6px #5de6ff88)">
      <!-- Body -->
      <rect x="10" y="22" width="32" height="28" rx="6" fill="#0d1f3c" stroke="currentColor" stroke-width="1.5"/>
      <!-- Head -->
      <rect x="13" y="6" width="26" height="20" rx="5" fill="#0d1f3c" stroke="currentColor" stroke-width="1.5"/>
      <!-- Visor -->
      <rect x="16" y="9" width="20" height="11" rx="3" fill="#5de6ff22" stroke="#5de6ff" stroke-width="1"/>
      <!-- Eyes on visor -->
      <circle cx="21" cy="14" r="2.5" fill="#5de6ff" style="animation:blink 3s ease-in-out infinite"/>
      <circle cx="31" cy="14" r="2.5" fill="#5de6ff" style="animation:blink 3s ease-in-out infinite 0.15s"/>
      <!-- Pupils -->
      <circle cx="22" cy="14" r="1" fill="#001a2e"/>
      <circle cx="32" cy="14" r="1" fill="#001a2e"/>
      <!-- Screen on body -->
      <rect x="15" y="27" width="22" height="14" rx="2" fill="#001a2e" stroke="#5de6ff44" stroke-width="0.5"/>
      <!-- Typing text lines on screen -->
      <rect x="17" y="30" width="12" height="1.5" rx="0.75" fill="#5de6ff" style="animation:screen-flicker 1s ease-in-out infinite"/>
      <rect x="17" y="33" width="16" height="1.5" rx="0.75" fill="#5de6ff88"/>
      <rect x="17" y="36" width="9" height="1.5" rx="0.75" fill="#5de6ff55" style="animation:screen-flicker 0.8s ease-in-out infinite 0.4s"/>
      <!-- Cursor blink -->
      <rect x="27" y="36" width="1" height="1.5" fill="#5de6ff" style="animation:blink 0.8s ease-in-out infinite"/>
      <!-- Left arm typing -->
      <rect x="2" y="32" width="8" height="4" rx="2" fill="#0d1f3c" stroke="currentColor" stroke-width="1.2" style="transform-origin:10px 34px;animation:arm-type 0.4s ease-in-out infinite"/>
      <!-- Right arm typing -->
      <rect x="42" y="32" width="8" height="4" rx="2" fill="#0d1f3c" stroke="currentColor" stroke-width="1.2" style="transform-origin:42px 34px;animation:arm-type 0.4s ease-in-out infinite 0.2s"/>
      <!-- Antenna -->
      <line x1="26" y1="6" x2="26" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="26" cy="1" r="2" fill="currentColor" style="animation:pulse-glow 1s ease-in-out infinite"/>
      <!-- Legs -->
      <rect x="16" y="50" width="7" height="10" rx="2" fill="#0d1f3c" stroke="currentColor" stroke-width="1.2"/>
      <rect x="29" y="50" width="7" height="10" rx="2" fill="#0d1f3c" stroke="currentColor" stroke-width="1.2"/>
      <!-- Feet -->
      <rect x="14" y="58" width="11" height="5" rx="2" fill="currentColor" opacity="0.8"/>
      <rect x="27" y="58" width="11" height="5" rx="2" fill="currentColor" opacity="0.8"/>
    </svg>
    <span class="minion-label" style="color:#5de6ff">Content</span>
    <span class="minion-status">● ACTIVE</span>
  </div>

  <!-- ENGAGEMENT AGENT — waving / scanning, THINKING -->
  <div class="minion-wrap minion-thinking" onclick="navigate('lead_pipeline_sales_agent')" title="Go to Lead Pipeline" style="color:#818cf8">
    <svg class="minion-body" width="52" height="64" viewBox="0 0 52 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:#818cf8;filter:drop-shadow(0 0 6px #818cf888)">
      <!-- Body -->
      <rect x="10" y="22" width="32" height="28" rx="6" fill="#0d1320" stroke="currentColor" stroke-width="1.5"/>
      <!-- Head -->
      <rect x="13" y="6" width="26" height="20" rx="5" fill="#0d1320" stroke="currentColor" stroke-width="1.5"/>
      <!-- Visor — scanning style -->
      <rect x="16" y="9" width="20" height="11" rx="3" fill="#818cf822" stroke="#818cf8" stroke-width="1"/>
      <!-- Scanning line -->
      <rect x="16" y="14" width="20" height="1.5" fill="#818cf8" opacity="0.6" style="animation:arm-scan 1.5s ease-in-out infinite alternate"/>
      <!-- Eye circles -->
      <circle cx="21" cy="14" r="2.5" fill="#818cf8" style="animation:blink 4s ease-in-out infinite 0.5s"/>
      <circle cx="31" cy="14" r="2.5" fill="#818cf8" style="animation:blink 4s ease-in-out infinite"/>
      <!-- Pupils looking sideways -->
      <circle cx="20" cy="14" r="1" fill="#0a0018"/>
      <circle cx="30" cy="14" r="1" fill="#0a0018"/>
      <!-- Antenna with spinning gear -->
      <line x1="26" y1="6" x2="26" y2="1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="26" cy="1" r="2.5" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" style="animation:eye-spin 2s linear infinite"/>
      <!-- Body screen — graph -->
      <rect x="15" y="27" width="22" height="14" rx="2" fill="#090915" stroke="#818cf844" stroke-width="0.5"/>
      <polyline points="17,38 21,33 25,36 29,29 36,32" stroke="#818cf8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Waving arm -->
      <rect x="2" y="26" width="8" height="4" rx="2" fill="#0d1320" stroke="currentColor" stroke-width="1.2" style="transform-origin:10px 28px;animation:arm-wave 1.2s ease-in-out infinite"/>
      <!-- Other arm down -->

  wrap.classList.add('page-fade-in');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeBtn = document.getElementById('nav-' + pageId);
  if (activeBtn) activeBtn.classList.add('active');
  const meta = PAGE_META[pageId];
  if (meta) {
    document.getElementById('breadcrumb').textContent = GROUP_LABELS[meta.group] || meta.group;
    document.getElementById('page-title').textContent = meta.label;
    const groupEl = document.getElementById('group-' + meta.group);
    const btn = groupEl?.previousElementSibling;
    if (groupEl && !groupEl.classList.contains('open')) {
      groupEl.classList.add('open');
      if (btn) btn.classList.add('open');
    }
  }
  wrap.querySelectorAll('script').forEach(orig => {
    const s = document.createElement('script');
    s.textContent = orig.textContent;
    document.head.appendChild(s).parentNode.removeChild(s);
  });
  closeMobileSidebar();
}

function toggleGroup(g) {
  const items = document.getElementById('group-' + g);
  const btn = items?.previousElementSibling;
  items?.classList.toggle('open');
  btn?.classList.toggle('open');
}

function toggleSidebar() {
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    document.getElementById('sidebar').classList.toggle('mobile-open');
    document.getElementById('mobile-overlay').classList.toggle('show');
  } else {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
    document.getElementById('topbar').classList.toggle('full', !sidebarOpen);
    document.getElementById('content-wrap').classList.toggle('full', !sidebarOpen);
    document.getElementById('minion-bar').classList.toggle('full', !sidebarOpen);
  }
}

function closeMobileSidebar() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('mobile-overlay').classList.remove('show');
}

// Live ticker
const TICKS = [
  "Content Agent drafting LinkedIn post #7...",
  "Sales Agent qualified lead → BANT: 91",
  "Engagement Agent replied to 3 DMs...",
  "Analytics Agent: TikTok CTR up 14%",
  "Content Agent scheduling Instagram reel...",
  "Sales Agent booked call with Sarah M.",
  "Engagement Agent detected high-intent DM",
  "Content Agent generated 5 caption variants",
];
let tickIdx = 0;
const ticker = document.getElementById('live-ticker');
function rotateTick() {
  ticker.style.opacity = '0';
  setTimeout(() => {
    ticker.textContent = TICKS[tickIdx % TICKS.length];
    ticker.style.opacity = '1';
    tickIdx++;
  }, 300);
}
ticker.style.transition = 'opacity 0.3s';
rotateTick();
setInterval(rotateTick, 3000);

// Boot
document.addEventListener('DOMContentLoaded', () => {
  const firstGroup = document.querySelector('.nav-group-items');
  firstGroup?.classList.add('open');
  firstGroup?.previousElementSibling?.classList.add('open');
  navigate('main_dashboard_overview');
});
</script>
